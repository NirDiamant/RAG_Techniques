<svg xmlns="http://www.w3.org/2000/svg" width="440" height="64" viewBox="0 0 440 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="55%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="3" y="3" width="434" height="56" rx="28" fill="url(#grad)" filter="url(#shadow)"/>
  <rect x="3" y="3" width="434" height="27" rx="27" fill="url(#gloss)"/>
  <rect x="3.5" y="3.5" width="433" height="55" rx="27.5" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>

  <!-- gift icon -->
  <g>
    <path d="M57 21 c-2 -6.5 -9.5 -7.5 -9.5 -3.2 c0 3.2 5.2 3.7 9.5 3.2 z" fill="#ffffff"/>
    <path d="M59 21 c2 -6.5 9.5 -7.5 9.5 -3.2 c0 3.2 -5.2 3.7 -9.5 3.2 z" fill="#ffffff"/>
    <rect x="43" y="22" width="30" height="9" rx="2" fill="#ffffff"/>
    <rect x="46" y="33" width="24" height="13" rx="2" fill="#ffffff"/>
    <rect x="55.5" y="22" width="5" height="24" fill="#0d9488"/>
  </g>

  <!-- text -->
  <text x="234" y="30" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Claim your free module</text>
  <text x="234" y="48" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#ffffff" fill-opacity="0.92" text-anchor="middle">7-min video &#183; hands-on tutorial &#183; AI assistant</text>

  <!-- chevron -->
  <path d="M404 24 l9 8 l-9 8" stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
